<!DOCTYPE html>
<html>
<head>
    <title>Analytics Suite</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .card-custom {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .navbar {
            background: rgba(0,0,0,0.7);
        }

        .table {
            color: white;
        }

        .fade-in {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {opacity:0;}
            to {opacity:1;}
        }
    </style>
</head>

<body>

<nav class="navbar px-4">
    <span class="text-white fw-bold">📊 Analytics Suite</span>

    <div>
        <a href="/" class="btn btn-light btn-sm">Home</a>
        <a href="/upload/" class="btn btn-warning btn-sm">Upload</a>
        <a href="/analytics/" class="btn btn-success btn-sm">Analytics</a>
    </div>
</nav>

<div class="container mt-4 fade-in">
    {% block content %}{% endblock %}
</div>

</body>
</html>
